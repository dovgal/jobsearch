<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Job Search Consultation{% endblock %}</title>

<!-- Open Graph / Telegram preview -->
<meta property="og:type" content="website">
<meta property="og:title" content="{% block og_title %}Job Search Consultation{% endblock %}">
<meta property="og:description" content="{% block og_description %}Мульти-агентный карьерный консультант на базе ИИ: стратегия поиска работы, переработка CV, оптимизация LinkedIn-профиля, поиск вакансий и подготовка к интервью. Настроен на рынок труда Франции 2024–2025.{% endblock %}">
<meta property="og:image" content="{% block og_image %}/static/og-preview.png{% endblock %}">
<meta property="og:locale" content="fr_FR">

<!-- Twitter Card (также используется некоторыми мессенджерами) -->
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{% block tw_title %}Job Search Consultation{% endblock %}">
<meta name="twitter:description" content="{% block tw_description %}Мульти-агентный карьерный консультант на базе ИИ: стратегия поиска работы, переработка CV, оптимизация LinkedIn-профиля, поиск вакансий и подготовка к интервью. Настроен на рынок труда Франции 2024–2025.{% endblock %}">
<meta name="twitter:image" content="/static/og-preview.png">

<meta name="description" content="Мульти-агентный карьерный консультант на базе ИИ для рынка труда Франции.">
<script src="https://unpkg.com/htmx.org@1.9.12/dist/htmx.min.js"></script>
<style>
  :root {
    --bg: #0d0f12; --surface: #161a22; --border: #20242c;
    --text: #e8eaed; --muted: #9aa0a6; --accent: #8ab4f8;
    --green: #4ade80; --yellow: #facc15; --red: #f87171;
    --green-bg: #14532d; --yellow-bg: #5a4a0a; --red-bg: #5b1a1a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  nav { background: #11141a; border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 16px; }
  nav .logo { font-weight: 700; font-size: 17px; }
  nav .logo span { color: var(--accent); }
  .nav-link { color: var(--muted); font-size: 14px; }

  .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 20px; }
  .card + .card { margin-top: 16px; }
  .card-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-muted { background: #1f2530; color: var(--muted); }

  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 10px; border: 0; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  .btn:hover { opacity: .85; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: var(--accent); color: #0d0f12; }
  .btn-ghost { background: #1f2530; color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--red-bg); color: var(--red); border: 1px solid #7f1d1d; }
  .btn-sm { padding: 6px 12px; font-size: 13px; }

  .grid2 { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }

  input[type=text], textarea, .input {
    background: #0d0f12; border: 1px solid var(--border); border-radius: 8px;
    color: var(--text); padding: 10px 14px; font-size: 14px; width: 100%;
    font-family: inherit; resize: vertical;
  }
  input[type=text]:focus, textarea:focus { outline: none; border-color: var(--accent); }

  label { font-size: 13px; color: var(--muted); display: block; margin-bottom: 6px; }

  .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .muted { color: var(--muted); font-size: 13px; }
  .mt-2 { margin-top: 8px; }
  .mt-4 { margin-top: 16px; }
  .mt-6 { margin-top: 24px; }
  .flex { display: flex; }
  .gap-2 { gap: 8px; }
  .gap-3 { gap: 12px; }
  .items-center { align-items: center; }
  .flex-wrap { flex-wrap: wrap; }
  .w-full { width: 100%; }

  .agent-locked { opacity: .5; pointer-events: none; }
  pre { white-space: pre-wrap; font: 13px/1.6 "Fira Code", monospace; background: #0d0f12; padding: 14px; border-radius: 8px; overflow: auto; max-height: 300px; }

  @media (max-width: 600px) {
    .container { padding: 16px; }
    .grid2 { grid-template-columns: 1fr; }
  }
</style>
{% block head %}{% endblock %}
</head>
<body>
<nav>
  <a href="/" class="logo">Job Search <span>Consultation</span></a>
  <a href="/" class="nav-link">Сессии</a>
  <a href="/settings" class="nav-link">⚙️ Настройки LLM</a>
</nav>
<div class="container">
  {% block content %}{% endblock %}
</div>
</body>
</html>
